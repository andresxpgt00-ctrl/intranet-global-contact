<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Contact Intranet</title>
  <style>
    :root{--blue:#0b57d0;--blue2:#083b96;--cyan:#15c8ff;--dark:#07162f;--muted:#64748b;--bg:#f4f7fb;--card:#ffffff;--line:#e6edf6;--green:#22c55e;--orange:#ff9f1c;--red:#ef4444;--shadow:0 18px 50px rgba(7,22,47,.12);--radius:24px}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:#101828} a{color:inherit;text-decoration:none} button,input,textarea,select{font:inherit} button{cursor:pointer}
    .app{min-height:100vh;display:grid;grid-template-columns:290px 1fr}.sidebar{background:linear-gradient(180deg,var(--dark),#0a2e76);color:#fff;padding:24px 18px;position:sticky;top:0;height:100vh;overflow:auto}.brand{display:flex;gap:12px;align-items:center;margin-bottom:24px}.logo{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,var(--cyan),#fff);display:grid;place-items:center;color:var(--blue2);font-weight:900;font-size:22px;box-shadow:0 10px 30px rgba(21,200,255,.3)}.brand h1{font-size:22px;margin:0;line-height:1.05}.brand span{font-size:12px;color:#a9c3ff}.side-search{position:relative;margin:18px 0}.side-search input{width:100%;border:1px solid rgba(255,255,255,.16);border-radius:16px;background:rgba(255,255,255,.08);color:#fff;padding:12px 14px;outline:none}.side-search input::placeholder{color:#b7c7ec}.menu-title{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#8fb4ff;margin:22px 8px 10px}.nav{display:grid;gap:6px}.nav button{border:0;background:transparent;color:#dbe8ff;text-align:left;padding:12px 14px;border-radius:14px;display:flex;justify-content:space-between;align-items:center}.nav button:hover,.nav button.active{background:rgba(255,255,255,.12);color:#fff}.badge{font-size:11px;background:rgba(255,255,255,.14);padding:3px 8px;border-radius:999px}.main{min-width:0}.topbar{height:78px;background:rgba(255,255,255,.84);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 30px;position:sticky;top:0;z-index:10}.topbar h2{margin:0;font-size:21px}.actions{display:flex;gap:10px;align-items:center}.pill{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 14px;box-shadow:0 8px 22px rgba(7,22,47,.06)}.primary{border:0;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;border-radius:999px;padding:11px 18px;box-shadow:0 12px 30px rgba(11,87,208,.25)}.wrap{padding:28px}.hero{position:relative;overflow:hidden;min-height:380px;border-radius:32px;background:#111;box-shadow:var(--shadow);color:#fff}.slide{position:absolute;inset:0;opacity:0;transition:opacity .7s ease;background-size:cover;background-position:center}.slide.active{opacity:1}.slide:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(7,22,47,.92),rgba(7,22,47,.46),rgba(7,22,47,.12))}.hero-content{position:relative;z-index:2;max-width:670px;padding:56px}.eyebrow{display:inline-flex;gap:8px;align-items:center;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);padding:8px 12px;border-radius:999px;font-size:13px}.hero h3{font-size:52px;line-height:1.02;margin:18px 0 12px}.hero p{font-size:18px;color:#e5efff;line-height:1.55}.hero-actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:25px}.ghost{border:1px solid rgba(255,255,255,.36);background:rgba(255,255,255,.1);color:#fff;border-radius:999px;padding:12px 18px}.dots{position:absolute;z-index:3;bottom:24px;left:56px;display:flex;gap:8px}.dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.45)}.dot.active{width:28px;border-radius:999px;background:#fff}.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:18px;margin:22px 0}.stat,.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 12px 35px rgba(7,22,47,.07)}.stat{padding:22px}.stat b{font-size:30px;display:block}.stat span{color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:20px}.card{padding:24px;overflow:hidden}.card h3{margin:0 0 10px;font-size:24px}.card p{color:var(--muted);line-height:1.55}.section-head{display:flex;justify-content:space-between;align-items:end;margin:34px 0 16px}.section-head h2{font-size:30px;margin:0}.section-head p{color:var(--muted);margin:6px 0 0}.quick{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}.quick .card{min-height:150px;transition:.25s}.quick .card:hover{transform:translateY(-5px);box-shadow:var(--shadow)}.icon{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,#e8f1ff,#fff);display:grid;place-items:center;font-size:23px;margin-bottom:14px}.gallery{display:grid;grid-template-columns:2fr 1fr 1fr;grid-auto-rows:190px;gap:16px}.photo{position:relative;border-radius:24px;background-size:cover;background-position:center;overflow:hidden;box-shadow:0 14px 30px rgba(7,22,47,.1)}.photo.big{grid-row:span 2}.photo:after{content:attr(data-title);position:absolute;left:16px;right:16px;bottom:16px;background:rgba(7,22,47,.72);color:#fff;border-radius:14px;padding:11px 13px;font-weight:700}.videos{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.video{height:210px;border-radius:24px;background:linear-gradient(135deg,#102a62,#0b57d0);color:#fff;display:grid;place-items:center;text-align:center;position:relative;overflow:hidden;box-shadow:var(--shadow)}.play{width:68px;height:68px;border-radius:50%;background:rgba(255,255,255,.18);display:grid;place-items:center;font-size:26px;margin:auto;border:1px solid rgba(255,255,255,.3)}.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:18px}.product{background:#fff;border:1px solid var(--line);border-radius:22px;overflow:hidden;box-shadow:0 10px 24px rgba(7,22,47,.06);transition:.2s}.product:hover{transform:translateY(-4px)}.product-img{height:128px;background:linear-gradient(135deg,#dbeafe,#fff 50%,#e0f2fe);display:grid;place-items:center;font-size:42px}.product-body{padding:16px}.product-body h4{margin:0 0 7px}.tag{display:inline-flex;border-radius:999px;background:#eef6ff;color:#0b57d0;padding:5px 9px;font-size:12px}.page{display:none}.page.active{display:block}.admin-layout{display:grid;grid-template-columns:1.15fr .85fr;gap:20px}.field{margin-bottom:14px}.field label{display:block;font-weight:700;margin-bottom:7px}.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 14px;background:#fff;outline:none}.field textarea{min-height:140px}.table{width:100%;border-collapse:collapse}.table th,.table td{padding:13px;border-bottom:1px solid var(--line);text-align:left}.table th{color:var(--muted);font-size:13px}.notice{background:linear-gradient(135deg,#e8f7ff,#fff);border:1px solid #d7efff;border-radius:22px;padding:18px;margin-bottom:18px}.hidden{display:none!important}.mobile-toggle{display:none}@media(max-width:1050px){.app{grid-template-columns:1fr}.sidebar{position:fixed;z-index:30;transform:translateX(-100%);transition:.25s;width:290px}.sidebar.open{transform:translateX(0)}.mobile-toggle{display:inline-flex}.stats,.quick{grid-template-columns:repeat(2,1fr)}.grid,.videos,.admin-layout{grid-template-columns:1fr}.gallery{grid-template-columns:1fr;grid-auto-rows:220px}.photo.big{grid-row:span 1}.hero h3{font-size:38px}.hero-content{padding:36px}.topbar{padding:0 16px}}@media(max-width:640px){.stats,.quick{grid-template-columns:1fr}.wrap{padding:16px}.hero{border-radius:22px}.topbar h2{display:none}.actions{gap:6px}.pill,.primary{padding:9px 11px}.hero h3{font-size:32px}}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand"><div class="logo">GC</div><div><h1>Global Contact</h1><span>Intranet corporativa</span></div></div>
    <div class="side-search"><input id="search" placeholder="Buscar menú, producto o recurso..." /></div>
    <div class="menu-title">Menú principal</div><div class="nav" id="mainMenu"></div>
    <div class="menu-title">Productos y campañas</div><div class="nav" id="productMenu"></div>
  </aside>
  <main class="main">
    <div class="topbar"><button class="pill mobile-toggle" onclick="toggleSidebar()">☰ Menú</button><h2 id="pageTitle">Inicio</h2><div class="actions"><button class="pill" onclick="showPage('usuario')">Vista Usuario</button><button class="primary" onclick="showPage('admin')">Vista Admin</button></div></div>
    <div class="wrap">
      <section id="usuario" class="page active"></section>
      <section id="admin" class="page"></section>
      <section id="generic" class="page"></section>
    </div>
  </main>
</div>
<script>
const slides=[
 {title:'Bienvenido a la intranet Global Contact',text:'Un centro visual para empleados: comunicados, herramientas, ventas, capacitación, productos y recursos internos.',img:'https://images.unsplash.com/photo-1556761175-b413da4baf72?auto=format&fit=crop&w=1600&q=80'},
 {title:'Materiales, scripts y campañas en un solo lugar',text:'Accede rápidamente a productos, listas de precio, bonos, tips de venta y contenido para redes.',img:'https://images.unsplash.com/photo-1552664730-d307ca884978?auto=format&fit=crop&w=1600&q=80'},
 {title:'Capacitación y bienestar para equipos',text:'Pausas activas, academia, inglés, oficios, belleza y recursos para mejorar el desempeño diario.',img:'https://images.unsplash.com/photo-1521737604893-d14cc237f11d?auto=format&fit=crop&w=1600&q=80'}
];
const mainPages=[
 ['inicio','Inicio','🏠'],['compania','Compañía','🏢'],['globalnews','Global News','📰'],['contact','Contacto','☎️'],['material','Material','📁'],['materialredes','Material Redes','📱'],['producto','Productos','🛍️'],['listaprecios','Lista de Precios','💲'],['listapreciosmultiven','Lista Precios Multiven','💳'],['pagos','Pagos','🏦'],['postventa','Postventa','🤝'],['pausas','Pausas Activas','🧘'],['tips','Tips','💡'],['TipsdeVentas','Tips de Ventas','🎯'],['bonificacion','Bonificación','🏆'],['bonos','Bonos','🎁'],['bonredes','Bonos Redes','🌐'],['calculadora','Calculadora','🧮'],['clic2ring','Clic2Ring','📞'],['leadsface','Leads Face','📣'],['academia','Academia','🎓'],['aprende_belleza','Aprende Belleza','💄'],['aprende_oficios','Aprende Oficios','🛠️'],['ingles','Inglés','🇺🇸'],['Smart Academias','Smart Academias','📚']
];
const productNames=['Bacticure','Barcelo','Beauty Boost','Berry','Better','Blossom','Bonbalm','Brazalete VGuard','Calvi','Cami Hot','Cannaxine','Carol','Cavitación','Cavitat','Cincher','Copper Shape','Doctor Ho','Dr Ming','Dtox','Dtox Tea','Extra Health','Fattache','Femi','Fir Slim','Free TV','Full Body Control','Gluten Off','Guildin','Helix Posture','Hollywood','Hot Belt','Instant','Laxee','Le Jeans','Liveraseltzer','Lumina','Meso Oral','Multiven','My Volume','Nodol','Paint Zoom','Petale','Power Slender','Prostabionic','Prostate','Prosthapytol','Prosvent','Redu Shaper','Relief','Rosario','Sani Skin','Skin','Sleep 8','Sleep Zen','Slim','Smart Lab','Smart Travel','Soothing U','Speech Conf','Superfood','Tallas','Testomax','Thermog Complex','Toma','Total','Ultra Colon Detox','Vacuna','Vibro','Vital Cure','Vital Socks','Xtreme','Zero Diet','Zona'];
let state=JSON.parse(localStorage.getItem('gcContent')||'{}');
function save(){localStorage.setItem('gcContent',JSON.stringify(state));}
function content(id,def){return state[id]||def}
function renderMenus(filter=''){
 const fm=filter.toLowerCase();
 document.getElementById('mainMenu').innerHTML=mainPages.filter(p=>p[1].toLowerCase().includes(fm)).map(p=>`<button onclick="openGeneric('${p[0]}','${p[1]}','${p[2]}')"><span>${p[2]} ${p[1]}</span><span class="badge">ver</span></button>`).join('');
 document.getElementById('productMenu').innerHTML=productNames.filter(n=>n.toLowerCase().includes(fm)).slice(0,60).map(n=>`<button onclick="openProduct('${n}')"><span>🛒 ${n}</span></button>`).join('');
}
function userHome(){return `<div class="hero" id="hero">${slides.map((s,i)=>`<div class="slide ${i==0?'active':''}" style="background-image:url('${s.img}')"><div class="hero-content"><span class="eyebrow">Portal interno · Empleados</span><h3>${s.title}</h3><p>${s.text}</p><div class="hero-actions"><button class="primary" onclick="openGeneric('material','Material','📁')">Explorar recursos</button><button class="ghost" onclick="openGeneric('producto','Productos','🛍️')">Ver productos</button></div></div></div>`).join('')}<div class="dots">${slides.map((_,i)=>`<span class="dot ${i==0?'active':''}"></span>`).join('')}</div></div><div class="stats"><div class="stat"><b>25+</b><span>menús internos</span></div><div class="stat"><b>70+</b><span>productos/campañas</span></div><div class="stat"><b>2</b><span>vistas: usuario y admin</span></div><div class="stat"><b>100%</b><span>compatible con GitHub Pages</span></div></div><div class="notice"><b>Comunicado:</b> <span id="announcement">${content('announcement','Bienvenido a la intranet corporativa. Revisa noticias, capacitación, productos y herramientas de operación.')}</span></div><div class="section-head"><div><h2>Accesos rápidos</h2><p>Servicios y herramientas para empleados.</p></div></div><div class="quick">${mainPages.slice(1,9).map(p=>`<div class="card" onclick="openGeneric('${p[0]}','${p[1]}','${p[2]}')"><div class="icon">${p[2]}</div><h3>${p[1]}</h3><p>Consultar, copiar y revisar información interna de ${p[1].toLowerCase()}.</p></div>`).join('')}</div><div class="section-head"><div><h2>Galería corporativa</h2><p>Espacios para fotos de equipo, campañas, eventos y cultura.</p></div></div><div class="gallery"><div class="photo big" data-title="Equipo comercial" style="background-image:url('https://images.unsplash.com/photo-1551836022-d5d88e9218df?auto=format&fit=crop&w=900&q=80')"></div><div class="photo" data-title="Capacitación" style="background-image:url('https://images.unsplash.com/photo-1517048676732-d65bc937f952?auto=format&fit=crop&w=700&q=80')"></div><div class="photo" data-title="Productos" style="background-image:url('https://images.unsplash.com/photo-1472851294608-062f824d29cc?auto=format&fit=crop&w=700&q=80')"></div><div class="photo" data-title="Bienestar" style="background-image:url('https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?auto=format&fit=crop&w=700&q=80')"></div><div class="photo" data-title="Noticias internas" style="background-image:url('https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=700&q=80')"></div></div><div class="section-head"><div><h2>Galería de videos</h2><p>Entrenamientos, lanzamientos y mensajes internos.</p></div></div><div class="videos"><div class="video"><div><div class="play">▶</div><h3>Inducción</h3><p>Video para nuevos empleados</p></div></div><div class="video"><div><div class="play">▶</div><h3>Ventas</h3><p>Scripts, objeciones y cierre</p></div></div><div class="video"><div><div class="play">▶</div><h3>Producto</h3><p>Características y beneficios</p></div></div></div><div class="section-head"><div><h2>Productos destacados</h2><p>Catálogo visual inspirado en las páginas existentes.</p></div><button class="pill" onclick="openGeneric('producto','Productos','🛍️')">Ver catálogo completo</button></div><div class="products">${productNames.slice(0,12).map(productCard).join('')}</div>`}
function productCard(n){return `<div class="product" onclick="openProduct('${n}')"><div class="product-img">${['💊','🧴','🛍️','🌿','💪','✨'][n.length%6]}</div><div class="product-body"><span class="tag">Campaña</span><h4>${n}</h4><p>Ficha interna, argumentos, material y recursos del producto.</p></div></div>`}
function renderUser(){document.getElementById('usuario').innerHTML=userHome();startSlider();}
function startSlider(){let i=0;setInterval(()=>{const sl=[...document.querySelectorAll('.slide')],dt=[...document.querySelectorAll('.dot')];if(!sl.length)return;sl[i].classList.remove('active');dt[i].classList.remove('active');i=(i+1)%sl.length;sl[i].classList.add('active');dt[i].classList.add('active')},4200)}
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');document.getElementById('pageTitle').textContent=id==='admin'?'Panel Administrador':'Inicio';if(id==='admin')renderAdmin();if(id==='usuario')renderUser();closeSidebar();}
function openGeneric(id,title,icon){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));const g=document.getElementById('generic');g.classList.add('active');document.getElementById('pageTitle').textContent=title;const txt=content(id,`Contenido editable para ${title}. Aquí puedes incluir instrucciones, enlaces, documentos, imágenes, videos, tablas o comunicados para empleados.`);g.innerHTML=`<div class="section-head"><div><h2>${icon} ${title}</h2><p>Sección interna basada en el menú original de Global Contact.</p></div><button class="primary" onclick="editSection('${id}','${title}')">Editar en admin</button></div><div class="grid"><div class="card"><h3>Información principal</h3><p>${txt}</p></div><div class="card"><h3>Acciones disponibles</h3><p>Consultar, copiar contenido, revisar materiales y compartir enlaces internos.</p><button class="pill" onclick="navigator.clipboard.writeText(document.querySelector('#generic .card p').innerText)">Copiar contenido</button></div><div class="card"><h3>Archivos / enlaces</h3><p>Espacio preparado para cargar links de GitHub, Drive, videos o documentos internos.</p></div></div><div class="section-head"><div><h2>Recursos visuales</h2><p>Bloques de imagen/video para enriquecer esta página.</p></div></div><div class="gallery"><div class="photo big" data-title="${title}" style="background-image:url('https://images.unsplash.com/photo-1556761175-4b46a572b786?auto=format&fit=crop&w=900&q=80')"></div><div class="photo" data-title="Material" style="background-image:url('https://images.unsplash.com/photo-1556761175-5973dc0f32e7?auto=format&fit=crop&w=700&q=80')"></div><div class="photo" data-title="Equipo" style="background-image:url('https://images.unsplash.com/photo-1556761175-129418cb2dfe?auto=format&fit=crop&w=700&q=80')"></div></div>`;closeSidebar();}
function openProduct(n){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));const g=document.getElementById('generic');g.classList.add('active');document.getElementById('pageTitle').textContent=n;g.innerHTML=`<div class="section-head"><div><h2>🛒 ${n}</h2><p>Ficha interna de producto/campaña.</p></div><button class="primary" onclick="editSection('${n}','${n}')">Editar ficha</button></div><div class="grid"><div class="card"><div class="product-img" style="height:210px;border-radius:20px">✨</div></div><div class="card"><h3>Argumento comercial</h3><p>${content(n,'Describe beneficios, público objetivo, precio, objeciones frecuentes, bonos y guion recomendado para el equipo comercial.')}</p><button class="pill" onclick="navigator.clipboard.writeText(this.previousElementSibling.innerText)">Copiar argumento</button></div><div class="card"><h3>Recursos</h3><p>Fotos, videos, material para redes, preguntas frecuentes y lista de precios.</p><span class="tag">Producto activo</span></div></div><div class="section-head"><div><h2>Productos relacionados</h2></div></div><div class="products">${productNames.filter(x=>x!==n).slice(0,8).map(productCard).join('')}</div>`;closeSidebar();}
function renderAdmin(){document.getElementById('admin').innerHTML=`<div class="section-head"><div><h2>Panel Administrador</h2><p>Crea, edita o copia contenido. Los cambios se guardan en localStorage del navegador.</p></div></div><div class="admin-layout"><div class="card"><h3>Editor de contenido</h3><div class="field"><label>Sección</label><select id="editKey">${[...mainPages.map(p=>`<option value="${p[0]}">${p[1]}</option>`),...productNames.map(p=>`<option value="${p}">${p}</option>`)].join('')}</select></div><div class="field"><label>Título nuevo o existente</label><input id="newTitle" placeholder="Ej: Nuevo comunicado, campaña, producto..." /></div><div class="field"><label>Contenido</label><textarea id="editText" placeholder="Escribe el contenido que verá el empleado..."></textarea></div><button class="primary" onclick="saveEdit()">Guardar / actualizar</button> <button class="pill" onclick="copyEdit()">Copiar contenido</button> <button class="pill" onclick="newContent()">Crear nuevo</button></div><div class="card"><h3>Comunicado principal</h3><div class="field"><label>Texto del banner/comunicado</label><textarea id="annText">${content('announcement','Bienvenido a la intranet corporativa. Revisa noticias, capacitación, productos y herramientas de operación.')}</textarea></div><button class="primary" onclick="state.announcement=document.getElementById('annText').value;save();alert('Comunicado guardado')">Guardar comunicado</button><hr style="border:0;border-top:1px solid var(--line);margin:24px 0"><h3>Secciones existentes</h3><table class="table"><tbody>${mainPages.slice(0,10).map(p=>`<tr><td>${p[2]} ${p[1]}</td><td><button class="pill" onclick="editSection('${p[0]}','${p[1]}')">Editar</button></td></tr>`).join('')}</tbody></table></div></div>`;document.getElementById('editKey').addEventListener('change',e=>{document.getElementById('editText').value=state[e.target.value]||''});}
function editSection(id,title){showPage('admin');setTimeout(()=>{document.getElementById('editKey').value=id;document.getElementById('newTitle').value=title;document.getElementById('editText').value=state[id]||''},0)}
function saveEdit(){const k=document.getElementById('newTitle').value.trim()||document.getElementById('editKey').value;const v=document.getElementById('editText').value.trim();state[k]=v;save();alert('Contenido guardado')}
function copyEdit(){navigator.clipboard.writeText(document.getElementById('editText').value||'');alert('Contenido copiado')}
function newContent(){document.getElementById('newTitle').value='';document.getElementById('editText').value='';document.getElementById('editText').focus()}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open')}function closeSidebar(){document.getElementById('sidebar').classList.remove('open')}
document.getElementById('search').addEventListener('input',e=>renderMenus(e.target.value));renderMenus();renderUser();
</script>
</body>
</html>
